name: Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  contents: read
  id-token: write

jobs:
  provision_and_deploy:
    runs-on: ubuntu-latest
    env:
      TF_WORKING_DIR: terraform
      API_PROJECT: src/Api/AzureAppConfiguration.Api.csproj
      UI_PROJECT: src/Ui/AzureAppConfiguration.Ui.csproj
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Azure Login (OIDC Federated Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure Terraform Backend
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          sed -i 's/resource_group_name\s*=\s*"[^"]*"/resource_group_name  = "${{ vars.TF_STATE_RESOURCE_GROUP }}"/' provider.tf
          sed -i 's/storage_account_name\s*=\s*"[^"]*"/storage_account_name = "${{ vars.TF_STATE_STORAGE_ACCOUNT }}"/' provider.tf
          sed -i 's/container_name\s*=\s*"[^"]*"/container_name       = "${{ vars.TF_STATE_CONTAINER  }}"/' provider.tf
          sed -i 's/key\s*=\s*"[^"]*"/key                  = "${{ vars.TF_STATE_KEY }}"/' provider.tf
          echo "Updated provider.tf backend configuration:"
          grep -A 6 'backend "azurerm"' provider.tf

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init & Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          terraform validate

      - name: Terraform Workspace Setup
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          WORKSPACE="${{ inputs.environment || 'dev' }}"
          if terraform workspace select "$WORKSPACE" 2>/dev/null; then
            echo "Selected existing workspace: $WORKSPACE"
          else
            echo "Creating new workspace: $WORKSPACE"
            terraform workspace new "$WORKSPACE"
          fi
          
          echo "Current workspace: $(terraform workspace show)"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          WORKSPACE="${{ inputs.environment || 'dev' }}"
          terraform apply -auto-approve -var-file="${WORKSPACE}.tfvars"

      - name: Export Terraform Outputs
        id: tfout
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "rg=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT
          echo "api=$(terraform output -raw api_app_name)" >> $GITHUB_OUTPUT
          echo "ui=$(terraform output -raw ui_app_name)" >> $GITHUB_OUTPUT
          echo "kv=$(terraform output -raw kv_name)" >> $GITHUB_OUTPUT

      - name: Build & Publish API
        run: |
          dotnet publish ${{ env.API_PROJECT }} -c Release -o api_out
          cd api_out
          zip -r ../api.zip .

      - name: Build & Publish UI
        run: |
          dotnet publish ${{ env.UI_PROJECT }} -c Release -o ui_out
          cd ui_out
          zip -r ../ui.zip .

      - name: Deploy API via AZ CLI Zip Deploy
        run: |
          az webapp deploy \
            --resource-group "${{ steps.tfout.outputs.rg }}" \
            --name "${{ steps.tfout.outputs.api }}" \
            --type zip \
            --src-path api.zip

      - name: Deploy UI via AZ CLI Zip Deploy
        run: |
          az webapp deploy \
            --resource-group "${{ steps.tfout.outputs.rg }}" \
            --name "${{ steps.tfout.outputs.ui }}" \
            --type zip \
            --src-path ui.zip
